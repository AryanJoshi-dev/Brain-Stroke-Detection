<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{% endblock %}</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Bootstrap (for professional UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="#">Innovations in Stoke Identification A Machine Learing-Based Diagnostic Model Using Neuroimage</a>

    <div class="ms-auto">
        {% if session.get('user') %}
            <span class="text-white me-3">Hi, {{ session.get('user') }}</span>

            <a href="/prediction" class="btn btn-success me-2">Predict</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>

        {% else %}
            <a href="/login" class="btn btn-primary me-2">Login</a>
            <a href="/register" class="btn btn-warning">Register</a>
        {% endif %}
    </div>
</nav>
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand mb-0 h1"> Prediction System</span>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container-fluid mt-4">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
